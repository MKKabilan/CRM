<!DOCTYPE html>
<html>
<head>

<title>Simple CRM</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

input,select{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
}

table{
margin-top:30px;
border-collapse:collapse;
width:100%;
}

td,th{
border:1px solid #ccc;
padding:10px;
}

</style>

</head>

<body>

<h2>CRM System</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<select id="status">
<option>Lead</option>
<option>Interested</option>
<option>Customer</option>
</select>

<button onclick="saveLead()">Save</button>

<h3>Leads</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Status</th>
</tr>
</thead>

<tbody id="dataTable"></tbody>

</table>

<script>

const API="https://script.google.com/macros/s/AKfycbyjkSWnI-NnROyxty0ZL94-jqLChnVaZ9SvJNdeFsWxLR8Og_PV0M2BvgiUJ5CgXQs/exec"


function saveLead(){

let data={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
status:document.getElementById("status").value
}

fetch(API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(data)
})

alert("Lead Saved")

}



function loadData(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let html=""

data.forEach(row=>{

html+=`
<tr>
<td>${row.name}</td>
<td>${row.phone}</td>
<td>${row.email}</td>
<td>${row.status}</td>
</tr>
`

})

document.getElementById("dataTable").innerHTML=html

})

}

loadData()

</script>

</body>

</html>
